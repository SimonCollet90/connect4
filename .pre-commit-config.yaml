repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff (format)
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        stages: [pre-push]